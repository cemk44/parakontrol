<style>

.nb.on{background:var(--ac);color:#000;font-weight:700}
.nb .bg{background:var(--dg);color:#fff;border-radius:99px;font-size:8px;padding:1px 4px;font-weight:700}
.ct{padding:12px 12px 80px}
.ss{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.s{background:var(--cd);border-radius:10px;padding:12px;border:1px solid var(--bd);overflow:hidden}
.s label{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
.s .v{font-size:16px;font-weight:700}
.s .sb{font-size:9px;color:var(--tm);margin-top:2px}
.c{background:var(--cd);border-radius:10px;padding:14px;border:1px solid var(--bd);margin-bottom:12px}
.c h3{font-size:13px;font-weight:600;margin-bottom:10px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.r{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)}
.r:last-child{border:none}
.rl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}

.pb{background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .3s}
.bt{border:none;border-radius:7px;padding:7px 14px;cursor:pointer;font-size:11px;font-weight:700}
.ba{background:var(--ac);color:#000}.bw{background:var(--wn);color:#000}.bd{background:var(--dg);color:#fff}
.bf{width:100%;padding:10px;font-size:13px}.bs{padding:5px 10px;font-size:10px}
.al{border-radius:7px;padding:8px 10px;display:flex;align-items:flex-start;gap:6px;margin-bottom:6px;font-size:11px;line-height:1.4}
.ald{background:var(--dgd);border:1px solid var(--dg)}.alw{background:var(--wnd);border:1px solid var(--wn)}.ali{background:var(--ind);border:1px solid var(--in)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center}

.f{margin-bottom:12px}.f label{display:block;font-size:10px;color:var(--td);margin-bottom:4px}
.f input,.f select{width:100%;padding:9px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:13px;outline:none}
.tg{display:flex;gap:4px;margin-bottom:12px}.tg button{flex:1;padding:8px;border-radius:7px;border:1px solid var(--bd);background:var(--bg);color:var(--td);font-size:12px;font-weight:600;cursor:pointer}

.em{color:var(--td);text-align:center;padding:24px;font-size:12px}

.br .bv{font-size:9px;width:55px;text-align:right;flex-shrink:0}
.rem{background:linear-gradient(135deg,var(--wnd),#1a1500);border:1px solid var(--wn);border-radius:10px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:10px}

.rem .dy small{font-size:7px;font-weight:600;display:block;margin-top:1px}
.uz{border:2px dashed var(--bd);border-radius:12px;padding:20px;text-align:center;cursor:pointer}

.uz input{display:none}

.tg2{display:inline-block;padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;margin-left:4px}
.ct2{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid var(--bd);background:var(--bg);cursor:pointer}
.ct2.on{border-color:var(--ac);background:var(--acd);color:var(--ac)}

const CUR=[{id:"TRY",s:"₺"},{id:"USD",s:"$"},{id:"EUR",s:"€"},{id:"GBP",s:"£"}];
const CC=["#10b981","#3b82f6","#f59e0b","#8b5cf6","#ec4899"];
const MF=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const PC=["#10b981","#3b82f6","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316"];
const TIPS=[{t:"PPF Stratejisi",d:"Maaşı PPF'ye yatırıp kart ödemelerini bekletin.",c:"t"},{t:"50/30/20",d:"%50 ihtiyaç, %30 istek, %20 tasarruf.",c:"b"},{t:"Çeşitlendirme",d:"BIST, US, altın ve mevduatı dengeli dağıtın.",c:"y"},{t:"Döviz Çeşitliliği",d:"Varlıkları farklı para birimlerinde tutun.",c:"y"},{t:"Acil Durum Fonu",d:"3-6 aylık gider kadar fon oluşturun.",c:"t"},{t:"Kart Faizsiz Dönem",d:"Kesim tarihinden sonra harcama en uzun faizsiz dönemi sağlar.",c:"b"},{t:"Bileşik Getiri",d:"Getirileri tekrar yatırın.",c:"y"},{t:"48 Saat Kuralı",d:"Büyük harcamalarda bekleyin.",c:"b"}];
const MM={"ocak":"01","şubat":"02","mart":"03","nisan":"04","mayıs":"05","haziran":"06","temmuz":"07","ağustos":"08","eylül":"09","ekim":"10","kasım":"11","aralık":"12"};
const AK={food:["gıda","market","getir","yemeksepeti","starbuc","badem gida","aşsan gida","makbule"],transport:["pegasus","hgs","uber","otopark","akaryakit","güzel enerj"],home_deco:["ikea","normod","mobilya","bsh ev"],subs:["openai","canva","netflix","apple.com/bill","microsoft","linkedin","youtube","spotify"],health:["eczane"],clothing:["mavi giyim","zara"],insurance:["sigorta"],travel:["airbnb","booking"],entertainment:["cinema","sinema","paribucine"]};

const fmt=(n,c="TRY")=>(CUR.find(x=>x.id===c)?.s||"₺")+new Intl.NumberFormat("tr-TR",{minimumFractionDigits:0,maximumFractionDigits:c==="TRY"?0:2}).format(n);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const td=()=>new Date().toISOString().split("T")[0];
const ls=(k,v)=>{try{if(v===undefined)return JSON.parse(localStorage.getItem(k));localStorage.setItem(k,JSON.stringify(v))}catch{return null}};
const ptn=s=>parseFloat((s||"").replace(/\./g,"").replace(",","."))||0;

function autoCat(d){const dl=d.toLowerCase();for(const[c,ks]of Object.entries(AK)){if(ks.some(k=>dl.includes(k)))return c}if(dl.includes("amazon")||dl.includes("hepsiburada"))return"other_exp";return"other_exp"}

async function parsePDF(file){
  const buf=await file.arrayBuffer();
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let txt="";for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const tc=await p.getTextContent();txt+=tc.items.map(x=>x.str).join(" ")+"\n"}
  const all=txt.replace(/\n/g," ");const txs=[];let sm={total:0,due:""};
  const tm=all.match(/Toplam Ekstre Borcunuz\s+([\d.]+,\d{2})/);if(tm)sm.total=ptn(tm[1]);
  const dm=all.match(/Son Ödeme Tarihi\s+(\d+\s+\w+\s+\d{4})/);if(dm)sm.due=dm[1];
  const re=/(\d{1,2})\s+(Ocak|Şubat|Mart|Nisan|Mayıs|Haziran|Temmuz|Ağustos|Eylül|Ekim|Kasım|Aralık)\s+(\d{4})\s+([^\d]+?)\s+([\d.]+,\d{2})\s*(\+)?/gi;
  let m;while((m=re.exec(all))!==null){
    const desc=m[4].trim();const amt=ptn(m[5]);const cr=m[6]==="+";
    if(desc.includes("ÖNCEKİ DÖNEM")||desc.includes("DÖNEM FAİZ")||desc.includes("KKDF")||desc.includes("TOPLAM")||desc.includes("KAMPANYA")||desc.includes("GENEL")||desc.includes("ÖDEMENİZ")||desc.includes("MİL KULLANIM")||amt===0)continue;
    txs.push({id:uid(),date:`${m[3]}-${MM[m[2].toLowerCase()]}-${m[1].padStart(2,"0")}`,desc:desc.replace(/\s+/g," ").substring(0,55),amount:amt,isCredit:cr,category:autoCat(desc),type:cr?"income":"expense",source:"ekstre"});
  }
  return{txs,sm}
}

function Mod({show,onClose,title,children}){if(!show)return null;return<div className="mo" onClick={onClose}><div className="ml" onClick={e=>e.stopPropagation()}><h3>{title}<button onClick={onClose}>✕</button></h3>{children}</div></div>}
function F({label,children}){return<div className="f">{label&&<label>{label}</label>}{children}</div>}

function App(){
  const[tab,setTab]=useState("dash");
  const[txs,setTxs]=useState(()=>ls("p3_tx")||[]);
  const[bgt,setBgt]=useState(()=>ls("p3_bg")||{});
  const[inv,setInv]=useState(()=>ls("p3_iv")||[]);
  const[gls,setGls]=useState(()=>ls("p3_gl")||[]);
  const[cds,setCds]=useState(()=>ls("p3_cd")||[{id:"c1",n:"Kart 1",o:"ben",b:"Garanti BBVA",l:480000,bd:20,dd:30,cl:CC[0]},{id:"c2",n:"Kart 2",o:"ben",b:"",l:0,bd:1,dd:15,cl:CC[1]},{id:"c3",n:"Kart 3",o:"ben",b:"",l:0,bd:1,dd:15,cl:CC[2]},{id:"c4",n:"Eşimin 1",o:"eş",b:"",l:0,bd:1,dd:15,cl:CC[3]},{id:"c5",n:"Eşimin 2",o:"eş",b:"",l:0,bd:1,dd:15,cl:CC[4]}]);
  const[ctx,setCtx]=useState(()=>ls("p3_ct")||[]);
  const[ppf,setPpf]=useState(()=>ls("p3_pf")||{bal:0,rate:45,mv:[]});
  const[rem,setRem]=useState(()=>ls("p3_rm")||[]);
  const[rates,setRates]=useState(()=>ls("p3_rt")||{USD:38.5,EUR:41.2,GBP:48.5});
  const[extSums,setExtSums]=useState(()=>ls("p3_es")||[]);
  const[recExp,setRecExp]=useState(()=>ls("p3_re")||[]);
  const[recLog,setRecLog]=useState(()=>ls("p3_rl")||{});
  const[apiKey,setApiKey]=useState(()=>ls("p3_ak")||"");
  const[mod,setMod]=useState(null);
  const[tf,setTf]=useState({type:"expense",cat:"food",amt:"",desc:"",date:td(),cur:"TRY"});
  const[cf,setCf]=useState({cid:"c1",amt:"",desc:"",cat:"food",date:td()});
  const[pa,setPa]=useState("");const[pn,setPn]=useState("");
  const[ce,setCe]=useState({});const[cei,setCei]=useState(null);
  const[ivf,setIvf]=useState({type:"bist",name:"",amt:"",bp:"",cp:"",date:td(),md:"",ir:""});
  const[gf,setGf]=useState({name:"",tgt:"",cur:"",dl:"",cur:"TRY"});
  const[bf,setBf2]=useState({});
  const[prf,setPrf]=useState("");
  const[rf,setRf]=useState({title:"",date:"",amt:"",note:"",repeat:"none"});
  const[recF,setRecF]=useState({name:"",amt:"",cat:"housing",day:"1"});
  const[rtf,setRtf]=useState({});
  const[txFil,setTxFil]=useState("all");
  const[rM,setRM]=useState(new Date().getMonth());const[rY,setRY]=useState(new Date().getFullYear());
  const[parsing,setParsing]=useState(false);const[pr,setPr]=useState(null);
  const[rcpt,setRcpt]=useState(null);const[rcptLoading,setRcptLoading]=useState(false);const[rcptImg,setRcptImg]=useState(null);
  const[priceLoading,setPriceLoading]=useState(false);const[priceResults,setPriceResults]=useState(null);
  const fRef=useRef();const rcptRef=useRef();

  useEffect(()=>{ls("p3_tx",txs)},[txs]);useEffect(()=>{ls("p3_bg",bgt)},[bgt]);useEffect(()=>{ls("p3_iv",inv)},[inv]);useEffect(()=>{ls("p3_gl",gls)},[gls]);useEffect(()=>{ls("p3_cd",cds)},[cds]);useEffect(()=>{ls("p3_ct",ctx)},[ctx]);useEffect(()=>{ls("p3_pf",ppf)},[ppf]);useEffect(()=>{ls("p3_rm",rem)},[rem]);useEffect(()=>{ls("p3_rt",rates)},[rates]);useEffect(()=>{ls("p3_es",extSums)},[extSums]);useEffect(()=>{ls("p3_re",recExp)},[recExp]);useEffect(()=>{ls("p3_rl",recLog)},[recLog]);useEffect(()=>{ls("p3_ak",apiKey)},[apiKey]);

  // ─── AUTO-GENERATE RECURRING EXPENSES ───
  useEffect(()=>{
    if(!recExp.length)return;
    const key=`${cY}-${String(cM+1).padStart(2,"0")}`;
    const already=recLog[key]||[];
    const toAdd=recExp.filter(r=>r.active!==false&&!already.includes(r.id)&&now.getDate()>=r.day);
    if(!toAdd.length)return;
    const newTxs=toAdd.map(r=>({id:uid(),type:"expense",category:r.cat,amount:r.amt,desc:`🔄 ${r.name}`,date:`${cY}-${String(cM+1).padStart(2,"0")}-${String(r.day).padStart(2,"0")}`,source:"recurring"}));
    setTxs(p=>[...newTxs,...p]);
    setRecLog(p=>({...p,[key]:[...(p[key]||[]),...toAdd.map(r=>r.id)]}));
  },[recExp,cM,cY]);

  // ─── AUTO-GENERATE RECURRING REMINDERS ───
  const allReminders=useMemo(()=>{
    const single=rem.filter(r=>!r.repeat||r.repeat==="none");
    const recurring=rem.filter(r=>r.repeat&&r.repeat!=="none");
    const generated=[];
    recurring.forEach(r=>{
      for(let offset=0;offset<6;offset++){
        let d=new Date(r.date);
        if(r.repeat==="weekly")d.setDate(d.getDate()+offset*7);
        else if(r.repeat==="monthly"){d=new Date(d.getFullYear(),d.getMonth()+offset,d.getDate())}
        else if(r.repeat==="yearly"){d=new Date(d.getFullYear()+offset,d.getMonth(),d.getDate())}
        const dl=Math.ceil((d-now)/864e5);
        if(dl>=-1&&dl<=60)generated.push({...r,id:r.id+"_"+offset,date:d.toISOString().split("T")[0],dl,isGenerated:true,parentId:r.id});
      }
    });
    return[...single.map(r=>({...r,dl:Math.ceil((new Date(r.date)-now)/864e5)})),...generated].filter(r=>r.dl>=-1&&r.dl<=30).sort((a,b)=>a.dl-b.dl);
  },[rem]);

  const now=new Date(),cM=now.getMonth(),cY=now.getFullYear();
  const mTx=useMemo(()=>txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===cM&&d.getFullYear()===cY}),[txs,cM,cY]);
  const mI=useMemo(()=>mTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0),[mTx]);

                  <button className="db" onClick={()=>setRecExp(p=>p.map(x=>x.id===r.id?{...x,active:!x.active}:x))} style={{fontSize:10}}>{r.active!==false?"⏸":"▶️"}</button>
                  <button className="db" onClick={()=>setRecExp(p=>p.filter(x=>x.id!==r.id))}>🗑</button>
                </div>
              </div>
            </div>})}
        </div>

        {upco.length>0&&<div style={{marginTop:14}}><div style={{fontSize:12,fontWeight:600,color:"var(--td)",marginBottom:6}}>📅 Kart Ödemeleri</div>{upco.map(c=><div key={c.id} className="rem"><div className="dy" style={{background:c.dl<=3?"var(--dg)":"var(--cd)"}}>{c.dl}<small>gün</small></div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>💳 {c.n}</div><div style={{fontSize:9,color:"var(--td)"}}>{fmt(c.sp)}</div></div></div>)}</div>}
        {inv.filter(i=>i.type==="deposit"&&i.md).length>0&&<div style={{marginTop:14}}><div style={{fontSize:12,fontWeight:600,color:"var(--td)",marginBottom:6}}>🔒 Mevduat Vadeleri</div>{inv.filter(i=>i.type==="deposit"&&i.md).map(i=>{const d=Math.ceil((new Date(i.md)-now)/864e5);return<div key={i.id} className="rem"><div className="dy" style={{background:d<=0?"var(--dg)":d<=7?"var(--wn)":"var(--ac)"}}>{d<0?"!":d}<small>gün</small></div><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{i.name}</div><div style={{fontSize:9,color:"var(--td)"}}>{fmt(i.amt*i.cp)} · %{i.ir}</div></div></div>})}</div>}
      </div>}

      {/* REPORT */}
      {tab==="rp"&&<div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:12}}><div className="sc" style={{marginBottom:0}}>Rapor</div>
          <select value={rM} onChange={e=>setRM(+e.target.value)} style={{padding:"4px 6px",background:"var(--cd)",border:"1px solid var(--bd)",borderRadius:5,color:"var(--tx)",fontSize:10}}>{MF.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
          <select value={rY} onChange={e=>setRY(+e.target.value)} style={{padding:"4px 6px",background:"var(--cd)",border:"1px solid var(--bd)",borderRadius:5,color:"var(--tx)",fontSize:10}}>{[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}</select>
        </div>
        {(()=>{const ri=rTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);const re=rTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);return<div>
          <div className="ss" style={{gridTemplateColumns:"repeat(3,1fr)"}}><div className="s"><label>Gelir</label><div className="v m" style={{color:"var(--ac)",fontSize:14}}>{fmt(ri)}</div></div><div className="s"><label>Gider</label><div className="v m" style={{color:"var(--dg)",fontSize:14}}>{fmt(re)}</div></div><div className="s"><label>Net</label><div className="v m" style={{color:ri>=re?"var(--ac)":"var(--dg)",fontSize:14}}>{fmt(ri-re)}</div></div></div>
          <div className="c"><h3>Kategoriler</h3>{rEC.length===0?<div className="em">Veri yok</div>:rEC.map((e,i)=><div key={i} className="br"><div className="bl">{e.n}</div><div className="bk"><div style={{height:"100%",borderRadius:3,width:`${e.v/rMx*100}%`,background:PC[i%PC.length]}}/></div><div className="bv m">{fmt(e.v)}</div></div>)}</div>
        </div>})()}
      </div>}

      {/* SETTINGS */}
      {tab==="set"&&<div>
        <div className="sc">⚙️ Ayarlar</div>

        <div className="c">
          <h3>🔑 Anthropic API Anahtarı</h3>
          <div style={{fontSize:11,color:"var(--td)",marginBottom:10,lineHeight:1.6}}>
            Fiş tarama ve fiyat güncelleme özellikleri için gereklidir. API anahtarınız sadece telefonunuzun localStorage'ında saklanır, başka hiçbir yere gönderilmez.
          </div>
          <div style={{fontSize:11,color:"var(--td)",marginBottom:10,lineHeight:1.6}}>
            Anahtarınızı almak için: <b style={{color:"var(--tx)"}}>console.anthropic.com</b> → API Keys → Create Key
          </div>
          <F label="API Anahtarı"><input type="password" placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{fontFamily:"monospace",fontSize:12}}/></F>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {apiKey?<div style={{fontSize:12,color:"var(--ac)",fontWeight:700}}>✅ Anahtar kaydedildi ({apiKey.substring(0,12)}...)</div>:<div style={{fontSize:12,color:"var(--wn)"}}>⚠️ Anahtar girilmedi</div>}
            {apiKey&&<button className="bt bd bs" onClick={()=>setApiKey("")}>Sil</button>}
          </div>
        </div>

        <div className="c">
          <h3>💱 Döviz Kurları</h3>
          <div style={{fontSize:11,color:"var(--td)",marginBottom:10}}>Yatırım değerlerinin TRY karşılığını hesaplamak için kullanılır.</div>
          {["USD","EUR","GBP"].map(c=><div key={c} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,width:40}}>{c}</span>
            <input className="ii" style={{width:90,fontSize:13}} type="number" inputMode="decimal" value={rates[c]||""} onChange={e=>setRates(p=>({...p,[c]:parseFloat(e.target.value)||p[c]}))}/>
            <span style={{fontSize:11,color:"var(--td)"}}>TRY</span>
          </div>)}
        </div>

        <div className="c">
          <h3>🗑️ Veri Yönetimi</h3>
          <div style={{fontSize:11,color:"var(--td)",marginBottom:10}}>Tüm verileriniz telefonunuzdaki localStorage'da saklanır.</div>
          <button className="bt bd bs" onClick={()=>{if(confirm("Tüm verileri silmek istediğinize emin misiniz? Bu işlem geri alınamaz!")){Object.keys(localStorage).filter(k=>k.startsWith("p3_")).forEach(k=>localStorage.removeItem(k));location.reload()}}}>Tüm Verileri Sil</button>
        </div>

        <div className="c">
          <h3>ℹ️ Gizlilik</h3>
          <div style={{fontSize:11,color:"var(--td)",lineHeight:1.7}}>
            • Tüm finansal veriler sadece telefonunuzda saklanır<br/>
            • Ekstre PDF'leri tarayıcınızda işlenir, sunucuya gitmez<br/>
            • Fiş tarama: fotoğraf Anthropic API'ye gönderilir, işlendikten sonra saklanmaz<br/>
            • Fiyat güncelleme: sadece yatırım isimleri gönderilir<br/>
            • API anahtarınız sadece localStorage'da tutulur
          </div>
        </div>
      </div>}

      {/* TIPS */}
      {tab==="tp"&&<div><div className="sc">Finansal Bilgi</div>{TIPS.map((t,i)=><div key={i} className="c" style={{marginBottom:6}}><div style={{display:"inline-block",padding:"2px 6px",borderRadius:4,fontSize:8,fontWeight:700,background:t.c==="b"?"var(--acd)":t.c==="t"?"var(--ind)":"var(--prd)",color:t.c==="b"?"var(--ac)":t.c==="t"?"var(--in)":"var(--pr)"}}>{t.c==="b"?"BÜTÇE":t.c==="t"?"TASARRUF":"YATIRIM"}</div><div style={{fontSize:13,fontWeight:700,marginTop:4}}>{t.t}</div><div style={{fontSize:11,color:"var(--td)",lineHeight:1.5,marginTop:2}}>{t.d}</div></div>)}</div>}
    </div>

    {/* MODALS */}
    <Mod show={mod==="tx"} onClose={()=>setMod(null)} title="Yeni İşlem">
      <div className="tg"><button className={tf.type==="expense"?"ae":""} onClick={()=>setTf(f=>({...f,type:"expense",cat:"food"}))}>💸 Gider</button><button className={tf.type==="income"?"ai":""} onClick={()=>setTf(f=>({...f,type:"income",cat:"salary"}))}>💰 Gelir</button></div>
      <F label="Kategori"><select value={tf.cat} onChange={e=>setTf(f=>({...f,cat:e.target.value}))}>{(tf.type==="income"?CATS.inc:CATS.exp).map(c=><option key={c.id} value={c.id}>{c.i} {c.l}</option>)}</select></F>
      <div style={{display:"flex",gap:6}}><div style={{flex:1}}><F label="Tutar"><input type="number" inputMode="decimal" value={tf.amt} onChange={e=>setTf(f=>({...f,amt:e.target.value}))}/></F></div><div style={{width:75}}><F label="Birim"><select value={tf.cur} onChange={e=>setTf(f=>({...f,cur:e.target.value}))}>{CUR.map(c=><option key={c.id} value={c.id}>{c.s}</option>)}</select></F></div></div>
      <F label="Açıklama"><input value={tf.desc} onChange={e=>setTf(f=>({...f,desc:e.target.value}))}/></F>
      <F label="Tarih"><input type="date" value={tf.date} onChange={e=>setTf(f=>({...f,date:e.target.value}))}/></F>
      <button className="bt ba bf" onClick={addTx}>Kaydet</button>
    </Mod>
    <Mod show={mod==="ct"} onClose={()=>setMod(null)} title="💳 Kart Harcaması">
      <F label="Kart"><select value={cf.cid} onChange={e=>setCf(f=>({...f,cid:e.target.value}))}>{cds.map(c=><option key={c.id} value={c.id}>{c.n}</option>)}</select></F>
      <F label="Kategori"><select value={cf.cat} onChange={e=>setCf(f=>({...f,cat:e.target.value}))}>{CATS.exp.map(c=><option key={c.id} value={c.id}>{c.i} {c.l}</option>)}</select></F>
      <F label="Tutar"><input type="number" inputMode="decimal" value={cf.amt} onChange={e=>setCf(f=>({...f,amt:e.target.value}))}/></F>
      <F label="Açıklama"><input value={cf.desc} onChange={e=>setCf(f=>({...f,desc:e.target.value}))}/></F>
      <F label="Tarih"><input type="date" value={cf.date} onChange={e=>setCf(f=>({...f,date:e.target.value}))}/></F>
      <button className="bt bw bf" onClick={addCt}>Kaydet</button>
    </Mod>
    <Mod show={mod==="pd"} onClose={()=>setMod(null)} title="🏦 PPF Yatır">
      <F label="Tutar"><input type="number" inputMode="decimal" value={pa} onChange={e=>setPa(e.target.value)}/></F>
      <F label="Not"><input value={pn} onChange={e=>setPn(e.target.value)}/></F>
      <button className="bt ba bf" onClick={pDep}>Yatır</button>
    </Mod>
    <Mod show={mod==="pw"} onClose={()=>setMod(null)} title="🏦 PPF Çek">
      <div style={{fontSize:11,color:"var(--td)",marginBottom:10}}>Bakiye: <b style={{color:"var(--ac)"}}>{fmt(ppf.bal)}</b></div>
      <F label="Tutar"><input type="number" inputMode="decimal" value={pa} onChange={e=>setPa(e.target.value)}/></F>
      <F label="Not"><input value={pn} onChange={e=>setPn(e.target.value)}/></F>
      <button className="bt bd bf" onClick={pWit}>Çek</button>
    </Mod>
    <Mod show={mod==="pr"} onClose={()=>setMod(null)} title="PPF Oranı">
      <F label="Yıllık %"><input type="number" inputMode="decimal" value={prf} onChange={e=>setPrf(e.target.value)}/></F>
      <button className="bt ba bf" onClick={()=>{setPpf(p=>({...p,rate:parseFloat(prf)||p.rate}));setMod(null)}}>Kaydet</button>
    </Mod>
    <Mod show={mod==="ce"} onClose={()=>setMod(null)} title="⚙️ Kart">
      <F label="Ad"><input value={ce.n||""} onChange={e=>setCe(f=>({...f,n:e.target.value}))}/></F>
      <F label="Banka"><input value={ce.b||""} onChange={e=>setCe(f=>({...f,b:e.target.value}))}/></F>
      <F label="Limit"><input type="number" inputMode="decimal" value={ce.l||""} onChange={e=>setCe(f=>({...f,l:+e.target.value||0}))}/></F>
      <F label="Kesim Günü"><input type="number" inputMode="numeric" value={ce.bd||""} onChange={e=>setCe(f=>({...f,bd:+e.target.value||1}))}/></F>
      <F label="Ödeme Günü"><input type="number" inputMode="numeric" value={ce.dd||""} onChange={e=>setCe(f=>({...f,dd:+e.target.value||15}))}/></F>
      <button className="bt ba bf" onClick={saveCd}>Kaydet</button>
    </Mod>
    <Mod show={mod==="iv"} onClose={()=>setMod(null)} title="Yeni Yatırım">
      <F label="Tür"><select value={ivf.type} onChange={e=>setIvf(f=>({...f,type:e.target.value}))}>{INV.map(t=><option key={t.id} value={t.id}>{t.i} {t.l} ({t.c})</option>)}</select></F>
      <F label="Ad"><input placeholder="THYAO, AAPL, Altın..." value={ivf.name} onChange={e=>setIvf(f=>({...f,name:e.target.value}))}/></F>
      <F label="Adet"><input type="number" inputMode="decimal" value={ivf.amt} onChange={e=>setIvf(f=>({...f,amt:e.target.value}))}/></F>
      <F label={`Alış (${INV.find(x=>x.id===ivf.type)?.c||"TRY"})`}><input type="number" inputMode="decimal" value={ivf.bp} onChange={e=>setIvf(f=>({...f,bp:e.target.value}))}/></F>
      <F label="Güncel Fiyat"><input type="number" inputMode="decimal" value={ivf.cp} onChange={e=>setIvf(f=>({...f,cp:e.target.value}))}/></F>
      {ivf.type==="deposit"&&<><F label="Faiz %"><input type="number" inputMode="decimal" value={ivf.ir} onChange={e=>setIvf(f=>({...f,ir:e.target.value}))}/></F><F label="Vade Tarihi"><input type="date" value={ivf.md} onChange={e=>setIvf(f=>({...f,md:e.target.value}))}/></F></>}
      <button className="bt ba bf" onClick={addIv}>Kaydet</button>
    </Mod>
    <Mod show={mod==="gl"} onClose={()=>setMod(null)} title="Yeni Hedef">
      <F label="Ad"><input value={gf.name} onChange={e=>setGf(f=>({...f,name:e.target.value}))}/></F>
      <div style={{display:"flex",gap:6}}><div style={{flex:1}}><F label="Hedef"><input type="number" inputMode="decimal" value={gf.tgt} onChange={e=>setGf(f=>({...f,tgt:e.target.value}))}/></F></div><div style={{width:70}}><F label="Birim"><select value={gf.cur2||"TRY"} onChange={e=>setGf(f=>({...f,cur2:e.target.value}))}>{CUR.map(c=><option key={c.id} value={c.id}>{c.s}</option>)}</select></F></div></div>
      <F label="Mevcut"><input type="number" inputMode="decimal" value={gf.cur} onChange={e=>setGf(f=>({...f,cur:e.target.value}))}/></F>
      <F label="Son Tarih"><input type="date" value={gf.dl} onChange={e=>setGf(f=>({...f,dl:e.target.value}))}/></F>
      <button className="bt ba bf" onClick={addGl}>Kaydet</button>
    </Mod>
    <Mod show={mod==="rm"} onClose={()=>setMod(null)} title="🔔 Hatırlatma">
      <F label="Başlık"><input placeholder="ör: Kira ödemesi" value={rf.title} onChange={e=>setRf(f=>({...f,title:e.target.value}))}/></F>
      <F label="Tarih"><input type="date" value={rf.date} onChange={e=>setRf(f=>({...f,date:e.target.value}))}/></F>
      <F label="Tekrar"><select value={rf.repeat||"none"} onChange={e=>setRf(f=>({...f,repeat:e.target.value}))}>
        <option value="none">Tekrar etmesin</option>
        <option value="weekly">Haftalık</option>
        <option value="monthly">Aylık</option>
        <option value="yearly">Yıllık</option>
      </select></F>
      <F label="Tutar (ops.)"><input type="number" inputMode="decimal" value={rf.amt} onChange={e=>setRf(f=>({...f,amt:e.target.value}))}/></F>
      <F label="Not"><input value={rf.note} onChange={e=>setRf(f=>({...f,note:e.target.value}))}/></F>
      <button className="bt ba bf" onClick={addRm}>Kaydet</button>
    </Mod>
    <Mod show={mod==="recE"} onClose={()=>setMod(null)} title="🔄 Tekrarlayan Gider">
      <div style={{fontSize:11,color:"var(--td)",marginBottom:12}}>Her ay otomatik gider olarak kaydedilir.</div>
      <F label="Gider Adı"><input placeholder="ör: Kira, Aidat, Doğalgaz" value={recF.name} onChange={e=>setRecF(f=>({...f,name:e.target.value}))}/></F>
      <F label="Aylık Tutar (₺)"><input type="number" inputMode="decimal" placeholder="0" value={recF.amt} onChange={e=>setRecF(f=>({...f,amt:e.target.value}))}/></F>
      <F label="Kategori"><select value={recF.cat} onChange={e=>setRecF(f=>({...f,cat:e.target.value}))}>{CATS.exp.map(c=><option key={c.id} value={c.id}>{c.i} {c.l}</option>)}</select></F>
      <F label="Ayın Kaçında?"><input type="number" inputMode="numeric" placeholder="1" min="1" max="28" value={recF.day} onChange={e=>setRecF(f=>({...f,day:e.target.value}))}/></F>
      <button className="bt bw bf" onClick={addRecE}>Kaydet</button>
    </Mod>
    <Mod show={mod==="rt"} onClose={()=>setMod(null)} title="💱 Döviz Kurları">
      <div style={{fontSize:10,color:"var(--td)",marginBottom:10}}>Manuel girin. TRY'ye çevrimde kullanılır.</div>
      {["USD","EUR","GBP"].map(c=><F key={c} label={`1 ${c} = ? TRY`}><input type="number" inputMode="decimal" value={rtf[c]||""} onChange={e=>setRtf(f=>({...f,[c]:e.target.value}))}/></F>)}
      <button className="bt ba bf" onClick={()=>{const r={};["USD","EUR","GBP"].forEach(c=>r[c]=parseFloat(rtf[c])||rates[c]);setRates(r);setMod(null)}}>Kaydet</button>
    </Mod>
    <Mod show={mod==="bg"} onClose={()=>setMod(null)} title="Bütçe Limitleri">
      {CATS.exp.map(c=><F key={c.id} label={`${c.i} ${c.l}`}><input type="number" inputMode="decimal" placeholder="₺" value={bf[c.id]||""} onChange={e=>setBf2(f=>({...f,[c.id]:e.target.value}))}/></F>)}
      <button className="bt ba bf" onClick={saveBg}>Kaydet</button>
    </Mod>
  </div>);
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
